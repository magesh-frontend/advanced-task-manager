<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Task Manager</h1>

    <!-- FILTER BUTTONS -->
    <div class="filters">
        <button onclick="setFilter(event, 'all')" class="active">All</button>
        <button onclick="setFilter(event, 'completed')">Completed</button>
        <button onclick="setFilter(event, 'pending')">Pending</button>
    </div>

    <div class="input-container">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <button id="addBtn">Add Task</button>
        <p id="errorMsg"></p>
        <input type="text" id="searchInput" placeholder="🔍 Search tasks..." />
    </div>

    <p id="taskCount"></p>
    <p id="emptyMsg">No tasks available</p>
    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
